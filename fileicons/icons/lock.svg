<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- GOT Lock: Chained Padlock - BRIGHTER -->
  <rect x="3" y="1" width="14" height="19" rx="1.5" fill="#1A1A1A"/>
  <path d="M13 1 L17 5 L13 5 Z" fill="#90A4AE" opacity="0.6"/>
  <path d="M13 1 L17 5" stroke="#90A4AE" stroke-width="0.7"/>
  <!-- Lock shackle -->
  <path d="M7.5 10 L7.5 7 Q7.5 4 10 4 Q12.5 4 12.5 7 L12.5 10" fill="none" stroke="#90A4AE" stroke-width="1.5"/>
  <!-- Lock body -->
  <rect x="6" y="10" width="8" height="6" rx="1" fill="#90A4AE" opacity="0.4"/>
  <rect x="6" y="10" width="8" height="6" rx="1" fill="none" stroke="#90A4AE" stroke-width="0.8"/>
  <!-- Keyhole -->
  <circle cx="10" cy="12.5" r="1" fill="#1A1A1A"/>
  <path d="M9.3 13 L9.3 14.5 L10.7 14.5 L10.7 13" fill="#1A1A1A"/>
  <!-- Chain links -->
  <circle cx="4.5" cy="13" r="1.2" fill="none" stroke="#90A4AE" stroke-width="0.6"/>
  <circle cx="15.5" cy="13" r="1.2" fill="none" stroke="#90A4AE" stroke-width="0.6"/>
</svg>