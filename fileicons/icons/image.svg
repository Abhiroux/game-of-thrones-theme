  <defs>
    <linearGradient id="bg_img" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0D1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A060A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="3" y="1" width="14" height="19" rx="1.5" fill="url(#bg_img)"/>
  <path d="M13 1 L17 5 L13 5 Z" fill="#E040FB" opacity="0.4"/>
