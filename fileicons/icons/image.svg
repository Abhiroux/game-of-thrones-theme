  <!-- Mountain landscape inside -->
  <path d="M5 15 L8 10 L10 12 L13 8 L15 15 Z" fill="#E040FB" opacity="0.15"/>
  <path d="M5 15 L8 10 L10 12 L13 8 L15 15" fill="none" stroke="#E040FB" stroke-width="0.5" opacity="0.4"/>
