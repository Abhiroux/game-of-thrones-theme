  <path d="M13 1 L17 5 L13 5 Z" fill="#61DAFB" opacity="0.6"/>
  <path d="M13 1 L17 5" stroke="#61DAFB" stroke-width="0.7"/>
  <!-- Three dragon orbits -->
  <ellipse cx="10" cy="11" rx="5" ry="2" fill="none" stroke="#61DAFB" stroke-width="0.8"/>
  <ellipse cx="10" cy="11" rx="5" ry="2" fill="none" stroke="#61DAFB" stroke-width="0.8" transform="rotate(60 10 11)"/>
  <ellipse cx="10" cy="11" rx="5" ry="2" fill="none" stroke="#61DAFB" stroke-width="0.8" transform="rotate(-60 10 11)"/>
  <!-- Nucleus -->
  <circle cx="10" cy="11" r="1.5" fill="#61DAFB" opacity="0.8"/>
  <circle cx="10" cy="11" r="0.6" fill="#0A1929"/>
  <!-- Dragon heads -->
  <circle cx="15" cy="11" r="1" fill="#61DAFB"/>
  <circle cx="7.5" cy="7.5" r="1" fill="#61DAFB"/>
  <circle cx="7.5" cy="14.5" r="1" fill="#61DAFB"/>
