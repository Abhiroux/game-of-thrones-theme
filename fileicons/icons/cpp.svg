<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- GOT C++: War Hammer (Robert Baratheon) -->
  <defs>
    <linearGradient id="bg_cpp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0A00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="3" y="1" width="14" height="19" rx="1.5" fill="url(#bg_cpp)"/>
  <path d="M13 1 L17 5 L13 5 Z" fill="#FFB74D" opacity="0.4"/>
  <path d="M13 1 L17 5" stroke="#FFB74D" stroke-width="0.6" opacity="0.8"/>
  <!-- Hammer handle -->
  <line x1="10" y1="10" x2="10" y2="18" stroke="#8B4513" stroke-width="1.2" opacity="0.8"/>
  <!-- Hammer head -->
  <rect x="6" y="6" width="8" height="4.5" rx="0.5" fill="#808080" opacity="0.4"/>
  <rect x="6" y="6" width="8" height="4.5" rx="0.5" fill="none" stroke="#FFB74D" stroke-width="0.7" opacity="0.7"/>
  <!-- Hammer spikes -->
  <path d="M6 7 L4.5 7.5 L6 8.5" fill="#FFB74D" opacity="0.5"/>
  <path d="M14 7 L15.5 7.5 L14 8.5" fill="#FFB74D" opacity="0.5"/>
  <!-- ++ symbol -->
  <text x="7" y="17" font-family="monospace" font-size="5" font-weight="bold" fill="#FFB74D" opacity="0.6">++</text>
  <!-- Impact lines -->
  <line x1="5" y1="5" x2="4" y2="4" stroke="#FFB74D" stroke-width="0.4" opacity="0.3"/>
  <line x1="15" y1="5" x2="16" y2="4" stroke="#FFB74D" stroke-width="0.4" opacity="0.3"/>
</svg>