<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- GOT SQL: Crystal Ball / All-Seeing Eye (Greensight) -->
  <defs>
    <linearGradient id="bg_sql" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001A00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000A00;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="crystal_sql" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#66BB6A;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1B5E20;stop-opacity:0.1" />
    </radialGradient>
  </defs>
  <rect x="3" y="1" width="14" height="19" rx="1.5" fill="url(#bg_sql)"/>
  <path d="M13 1 L17 5 L13 5 Z" fill="#66BB6A" opacity="0.4"/>
  <path d="M13 1 L17 5" stroke="#66BB6A" stroke-width="0.6" opacity="0.8"/>
  <!-- Crystal ball -->
  <circle cx="10" cy="11" r="4" fill="url(#crystal_sql)"/>
  <circle cx="10" cy="11" r="4" fill="none" stroke="#66BB6A" stroke-width="0.7" opacity="0.6"/>
  <!-- Inner eye -->
  <ellipse cx="10" cy="11" rx="2" ry="1" fill="none" stroke="#66BB6A" stroke-width="0.5" opacity="0.5"/>
  <circle cx="10" cy="11" r="0.6" fill="#66BB6A" opacity="0.7"/>
  <!-- Stand -->
  <path d="M7.5 15 Q10 16 12.5 15" fill="none" stroke="#66BB6A" stroke-width="0.6" opacity="0.5"/>
  <line x1="8" y1="15.5" x2="8" y2="17" stroke="#66BB6A" stroke-width="0.5" opacity="0.4"/>
  <line x1="12" y1="15.5" x2="12" y2="17" stroke="#66BB6A" stroke-width="0.5" opacity="0.4"/>
  <!-- Highlight -->
  <path d="M8 9 Q9 8 9 9" fill="#FFFFFF" opacity="0.2"/>
</svg>