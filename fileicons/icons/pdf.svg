<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- GOT PDF: Bound Leather Tome -->
  <defs>
    <linearGradient id="bg_pdf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="3" y="1" width="14" height="19" rx="1.5" fill="url(#bg_pdf)"/>
  <path d="M13 1 L17 5 L13 5 Z" fill="#E53935" opacity="0.4"/>
  <path d="M13 1 L17 5" stroke="#E53935" stroke-width="0.6" opacity="0.8"/>
  <!-- Book cover -->
  <rect x="5" y="5" width="10" height="13" rx="1" fill="#8B0000" opacity="0.25"/>
  <rect x="5" y="5" width="10" height="13" rx="1" fill="none" stroke="#E53935" stroke-width="0.7" opacity="0.6"/>
  <!-- Book spine -->
  <line x1="5" y1="5" x2="5" y2="18" stroke="#E53935" stroke-width="1.5" opacity="0.5"/>
  <!-- Ornate diamond on cover -->
  <path d="M10 8 L12 10 L10 12 L8 10 Z" fill="none" stroke="#CFB53B" stroke-width="0.6" opacity="0.6"/>
  <circle cx="10" cy="10" r="0.6" fill="#CFB53B" opacity="0.5"/>
  <!-- Binding straps -->
  <line x1="5" y1="7" x2="15" y2="7" stroke="#CFB53B" stroke-width="0.4" opacity="0.4"/>
  <line x1="5" y1="16" x2="15" y2="16" stroke="#CFB53B" stroke-width="0.4" opacity="0.4"/>
  <!-- PDF label -->
  <text x="7" y="15" font-family="monospace" font-size="3.5" font-weight="bold" fill="#E53935" opacity="0.6">PDF</text>
</svg>